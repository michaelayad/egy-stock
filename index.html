<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مركز تحليل البورصة المصرية</title>
  <style>
    /* ══════ Reset ══════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ══════ Base ══════ */
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0a0e17;
      color: #e1e5eb;
      min-height: 100vh;
      direction: rtl;
    }

    /* ══════ Header ══════ */
    .header {
      background: linear-gradient(135deg, #0d1520 0%, #1a1f35 100%);
      border-bottom: 2px solid #1e90ff33;
      padding: 40px 20px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      color: #fff;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 1rem;
      color: #8892a4;
    }

    /* ══════ Stats Bar ══════ */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 16px 20px;
      background: #0d1219;
      border-bottom: 1px solid #1a2332;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-item .num {
      font-size: 1.5rem;
      font-weight: bold;
      color: #1e90ff;
    }

    .stat-item .label {
      font-size: 0.75rem;
      color: #5a6478;
      margin-top: 2px;
    }

    /* ══════ Filter Tabs ══════ */
    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: #141924;
      color: #8892a4;
      border: 1px solid #1e2a3a;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.3s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #1e90ff;
      color: #fff;
      border-color: #1e90ff;
    }

    /* ══════ Grid ══════ */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 20px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ══════ Card ══════ */
    .card {
      background: linear-gradient(145deg, #121826 0%, #161d2e 100%);
      border: 1px solid #1e2a3a;
      border-radius: 14px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 4px;
      height: 100%;
      background: #1e90ff;
      border-radius: 0 14px 14px 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: #1e90ff55;
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(30, 144, 255, 0.1);
    }

    .card:hover::before {
      opacity: 1;
    }

    /* ── Card Top Row ── */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .card-type {
      font-size: 0.7rem;
      color: #1e90ff;
      background: #1e90ff15;
      padding: 4px 12px;
      border-radius: 10px;
      border: 1px solid #1e90ff33;
    }

    .card-type.portfolio {
      color: #f5a623;
      background: #f5a62315;
      border-color: #f5a62333;
    }

    .card-type.suggestions {
      color: #2ecc71;
      background: #2ecc7115;
      border-color: #2ecc7133;
    }

    .card-badge {
      font-size: 0.65rem;
      color: #fff;
      background: #e74c3c;
      padding: 3px 10px;
      border-radius: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── Card Content ── */
    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .card-subtitle {
      font-size: 0.85rem;
      color: #6b7a90;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    /* ── Card Footer ── */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid #1a2332;
    }

    .card-date {
      font-size: 0.75rem;
      color: #4a5568;
    }

    .card-arrow {
      font-size: 1.2rem;
      color: #1e90ff;
      transition: transform 0.3s;
    }

    .card:hover .card-arrow {
      transform: translateX(-6px);
    }

    /* ══════ Empty State ══════ */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #4a5568;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    /* ══════ Footer ══════ */
    .footer {
      text-align: center;
      padding: 30px 20px;
      color: #3a4558;
      font-size: 0.75rem;
      border-top: 1px solid #141924;
    }

    /* ══════ Loading ══════ */
    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1a2332;
      border-top-color: #1e90ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ══════ Responsive ══════ */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.4rem; }
      .grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 16px; }
      .stat-item .num { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1 id="siteTitle">📊 مركز تحليل البورصة المصرية</h1>
    <p id="siteSubtitle">جاري التحميل...</p>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Filters -->
  <div class="filters" id="filters"></div>

  <!-- Cards Grid -->
  <div class="container">
    <div class="grid" id="grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>جاري تحميل التقارير...</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    ⚠️ أسواق المال فيها مخاطر عالية — التوصيات آراء تحليلية مش نصيحة ملزمة
    <br>تم الإنشاء بواسطة الذكاء الاصطناعي
  </div>

  <script>
    // ══════ Load JSON & Render ══════
    const TYPE_STYLES = {
      'تحليل أسهم': '',
      'محفظة': 'portfolio',
      'فرص مقترحة': 'suggestions'
    };

    let allReports = [];

    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        // Header
        document.getElementById('siteTitle').textContent = data.siteTitle;
        document.getElementById('siteSubtitle').textContent = data.siteSubtitle;
        document.title = data.siteTitle;

        allReports = data.reports;

        // Stats
        renderStats(data.reports);

        // Filters
        renderFilters(data.reports);

        // Cards
        renderCards(data.reports);
      })
      .catch(() => {
        document.getElementById('grid').innerHTML =
          '<div class="empty"><div class="empty-icon">⚠️</div><p>تعذر تحميل البيانات — تأكد إن ملف data.json موجود في نفس المجلد</p></div>';
      });

    // ── Stats ──
    function renderStats(reports) {
      const types = {};
      reports.forEach(r => { types[r.type] = (types[r.type] || 0) + 1; });

      let html = `<div class="stat-item"><div class="num">${reports.length}</div><div class="label">إجمالي التقارير</div></div>`;
      for (const [type, count] of Object.entries(types)) {
        html += `<div class="stat-item"><div class="num">${count}</div><div class="label">${type}</div></div>`;
      }
      document.getElementById('statsBar').innerHTML = html;
    }

    // ── Filters ──
    function renderFilters(reports) {
      const types = [...new Set(reports.map(r => r.type))];
      let html = '<button class="filter-btn active" onclick="filterCards(\'الكل\')">الكل</button>';
      types.forEach(t => {
        html += `<button class="filter-btn" onclick="filterCards('${t}')">${t}</button>`;
      });
      document.getElementById('filters').innerHTML = html;
    }

    function filterCards(type) {
      // Update active button
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      // Filter & render
      const filtered = type === 'الكل' ? allReports : allReports.filter(r => r.type === type);
      renderCards(filtered);
    }

    // ── Cards ──
    function renderCards(reports) {
      if (!reports.length) {
        document.getElementById('grid').innerHTML =
          '<div class="empty"><div class="empty-icon">📭</div><p>لا توجد تقارير في هذا التصنيف</p></div>';
        return;
      }

      let html = '';
      reports.forEach(r => {
        const typeClass = TYPE_STYLES[r.type] || '';
        const badge = r.badge ? `<span class="card-badge">${r.badge}</span>` : '';

        html += `
          <a class="card" href="${r.path}">
            <div class="card-top">
              <span class="card-type ${typeClass}">${r.type}</span>
              ${badge}
            </div>
            <div class="card-title">${r.title}</div>
            <div class="card-subtitle">${r.subtitle}</div>
            <div class="card-footer">
              <span class="card-date">📅 ${r.date}</span>
              <span class="card-arrow">←</span>
            </div>
          </a>`;
      });

      document.getElementById('grid').innerHTML = html;
    }
  </script>
</body>
</html>
